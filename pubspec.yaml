name: documaster
description: "DocuMaster - Offline Document Utility App"
publish_to: 'none'
version: 2.4.1+820

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  pdf: ^3.11.1
  printing: ^5.13.4
  image: ^4.3.0
  permission_handler: ^11.3.1
  open_file: ^3.5.7
  uuid: ^4.5.1
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
